<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body { font-family: system-ui; padding: 2rem; max-width: 400px; margin: auto; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, textarea, button { padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #0070f3; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <form method="POST" action="https://test123.artreiss.workers.dev/api/submit">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</body>
</html>
